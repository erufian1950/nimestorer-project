{% block navbar %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --brand-green:  #c8e6a0;
    --brand-yellow: #f5e6a0;
    --brand-pink:   #f5b8c8;
    --brand-dark:   #111111;
    --brand-gray:   #555555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #ffffff;
    color: var(--brand-dark);
  }

  /* ── NAVBAR ─────────────────────────────── */
  .navbar {
    background: #ffffff !important;
    border-bottom: 1px solid #f0f0f0;
    padding: 0.75rem 2rem;
  }

  .navbar-brand {
    font-weight: 900;
    font-size: 1.15rem;
    color: var(--brand-dark) !important;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .navbar-brand .brand-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
  }

  .navbar-nav .nav-link {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--brand-gray) !important;
    padding: 0.4rem 0.85rem !important;
    transition: color 0.2s;
  }

  .navbar-nav .nav-link:hover,
  .navbar-nav .nav-link.active {
    color: var(--brand-dark) !important;
  }

  .nav-login {
    font-weight: 700;
    font-size: 0.95rem;
    color: #7c3aed !important;
    text-decoration: none;
    margin-right: 1.2rem;
    transition: opacity 0.2s;
  }

  .nav-login:hover { opacity: 0.75; }

  .nav-socials a {
    color: var(--brand-gray);
    font-size: 1.15rem;
    margin-left: 0.55rem;
    transition: color 0.2s;
  }

  .nav-socials a:hover { color: var(--brand-dark); }
</style>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-3 px-lg-4">

    <!-- Brand -->
    <a class="navbar-brand" href="#">
      <span class="brand-icon">✦</span>
      NimeStore 
    </a>

    <!-- Toggler -->
    <button class="navbar-toggler border-0 shadow-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/home/' %}active disabled{% endif %}" aria-current="page" href="{% url 'home' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/catalog/' %}active disabled{% endif %}" aria-current="page" href="{% url 'catalog' %}">Catalog</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/contact/' %}active disabled{% endif %}" href="{% url 'contact' %}">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/gallery/' %}active disabled{% endif %}" href="{% url 'gallery' %}">Gallery</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/support/' %}active disabled{% endif %}" href="{% url 'support' %}">Support</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/about/' %}active disabled{% endif %}" href="{% url 'about' %}">About Us</a>
        </li>
      </ul>

      <!-- Right: Login + Socials -->
      <div class="d-flex align-items-center">
        <a class="nav-login" href="{% url 'login' %}">Login</a>
        <div class="nav-socials">
          <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
          <a href="#" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
          <a href="#" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
        </div>
      </div>
    </div>
  </div>
</nav>
{% endblock navbar %}

{% block content %}
{% endblock content %}
