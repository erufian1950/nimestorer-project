{% extends 'index.html' %}
{% block content %}
<style>
  /* ── HERO ───────────────────────────────────────── */
  .hero {
    position: relative;
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 80px 1.5rem;
  }

  /* Soft pastel blobs */
  .hero::before,
  .hero::after,
  .hero .blob-pink {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    pointer-events: none;
  }

  .hero::before {
    width: 380px;
    height: 320px;
    background: var(--brand-green);
    top: -60px;
    left: -80px;
  }

  .hero::after {
    width: 320px;
    height: 280px;
    background: var(--brand-yellow);
    top: -40px;
    right: -60px;
  }

  .hero .blob-pink {
    width: 300px;
    height: 260px;
    background: var(--brand-pink);
    bottom: -40px;
    right: 10%;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    max-width: 640px;
  }

  .hero-subtitle {
    font-size: 0.92rem;
    color: var(--brand-gray);
    margin-bottom: 1rem;
    letter-spacing: 0.01em;
  }

  .hero-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    line-height: 1.15;
    color: var(--brand-dark);
    margin-bottom: 1.1rem;
  }

  .hero-cta-note {
    font-size: 0.9rem;
    color: var(--brand-gray);
    margin-bottom: 2rem;
  }

  .btn-dark-solid {
    background: var(--brand-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.5rem;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    transition: background 0.2s, transform 0.15s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-dark-solid:hover {
    background: #333;
    color: #fff;
    transform: translateY(-1px);
  }

  .btn-outline-dark-soft {
    background: transparent;
    color: var(--brand-dark);
    border: 1.5px solid #ccc;
    border-radius: 8px;
    padding: 0.6rem 1.5rem;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    margin-left: 0.75rem;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-outline-dark-soft:hover {
    border-color: var(--brand-dark);
    background: #f5f5f5;
    transform: translateY(-1px);
  }
</style>

<section class="hero">
  <div class="blob-pink"></div>
  <div class="hero-content">
    <p class="hero-subtitle">Merchandise Anime, Game, dan Pop Culture Lainnya</p>
    <h1 class="hero-title">Belanja Kebutuhan Hiburanmu<br>bersama kami</h1>
    <p class="hero-cta-note">Login untuk memulai berbelanja</p>
    <div>
      <a href="{% url 'login' %}" class="btn-dark-solid">Login</a>
      <a href="{% url 'about' %}" class="btn-outline-dark-soft">Pelajari Lebih Lanjut</a>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YUe1v6uCWFMJGZWFMOYeoxmhq5a0AUmL6EWVXOKcFOHAJ7fYJYZ0fzXZ2tUJZ3a"
        crossorigin="anonymous"></script> 
{% endblock content %}
